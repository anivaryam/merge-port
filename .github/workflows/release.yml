name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Build and package binaries
        run: |
          VERSION=${GITHUB_REF_NAME}
          LDFLAGS="-s -w -X main.version=${VERSION}"

          platforms=(
            "linux/amd64"
            "linux/arm64"
            "darwin/amd64"
            "darwin/arm64"
            "windows/amd64"
          )

          mkdir -p dist

          for platform in "${platforms[@]}"; do
            GOOS="${platform%/*}"
            GOARCH="${platform#*/}"
            bin="merge-port"
            if [ "$GOOS" = "windows" ]; then
              bin="merge-port.exe"
            fi

            echo "Building ${GOOS}/${GOARCH}..."
            TMP="$(mktemp -d)"
            GOOS=$GOOS GOARCH=$GOARCH go build -ldflags "$LDFLAGS" -o "${TMP}/${bin}" ./cmd/mergeport

            archive="merge-port_${GOOS}_${GOARCH}"
            if [ "$GOOS" = "windows" ]; then
              (cd "$TMP" && zip -q "${OLDPWD}/dist/${archive}.zip" "$bin")
            else
              tar -czf "dist/${archive}.tar.gz" -C "$TMP" "$bin"
            fi
            rm -rf "$TMP"
          done

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: dist/*
